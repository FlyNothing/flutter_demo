name: flutter_demo
description: Flutter Demo项目

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter

  cached_network_image: ^3.2.2
  crypto: ^3.0.2
  cupertino_icons: ^1.0.2
  date_format: ^2.0.7
  dio: ^4.0.6
  easy_refresh: ^3.0.4+2
  flutter_date_picker_timeline: ^0.3.3
  flutter_easyloading: ^3.0.5  
  flutter_screenutil: ^5.3.1
  qr_flutter: ^4.0.0
  shared_preferences: ^2.0.1
  sqflite: ^2.0.3+1
  url_strategy: ^0.2.0
  video_player: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/